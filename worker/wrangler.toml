name = "anispace-oauth-proxy"
main = "oauth-proxy.js"
compatibility_date = "2024-01-01"
account_id = "4f0560fe4eba4e3180a15e8f43ce6d92"
workers_dev = true

[vars]
ALLOWED_ORIGIN = "https://afterrain-2005.github.io"
# 敏感信息（CLIENT_SECRET）请在 Cloudflare Dashboard 中配置为 Secrets

[[d1_databases]]
binding = "DB"
database_name = "anispace-db"
database_id = "b3d41a07-90b8-4cfe-8142-5679bc768c06"

# R2 Bucket — 论坛图片上传存储（需要先在 Cloudflare Dashboard 启用 R2）
# 启用 R2 后取消注释以下配置
# [[r2_buckets]]
# binding = "BUCKET"
# bucket_name = "anispace-uploads"

# Cron Trigger — 每周一 03:00 UTC 跑 bangumi-data 同步
# 周三 03:00 UTC 二次容错（bangumi-data 周一偶尔延迟）
# 每 30 分钟跑一次资讯爬取
[triggers]
crons = ["0 3 * * 1", "0 3 * * 3", "*/30 * * * *"]
